<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avanty Services — Cuestionario / Questionnaire</title>
<style>
  :root{
    --burgundy:#8B1A1A;
    --burgundy-dark:#6B1313;
    --gold:#C9A84C;
    --gold-light:#E8D9B0;
    --cream:#FDFCFA;
    --ink:#2B2420;
    --ink-soft:#6b5f55;
    --line:#E6DFD3;
    --danger:#B3261E;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Georgia','Times New Roman',serif;background:var(--cream);color:var(--ink);}
  .wrap{max-width:720px;margin:0 auto;padding:0 0 60px;}

  header{
    background:linear-gradient(135deg, var(--burgundy) 0%, var(--burgundy-dark) 100%);
    padding:28px 24px 24px;color:#fff;text-align:center;border-bottom:5px solid var(--gold);
    position:relative;
  }
  .logo-img{max-width:280px;width:70%;height:auto;background:#fff;border-radius:10px;padding:10px 16px;margin:0 auto 14px;display:block;}
  .doc-title{font-family:Arial, sans-serif;margin-top:4px;font-size:15px;letter-spacing:0.5px;color:#fff;font-weight:600;}
  .doc-sub{font-family:Arial, sans-serif;font-size:12.5px;color:var(--gold-light);margin-top:4px;}

  .lang-toggle{
    position:absolute;top:14px;right:14px;
    display:flex;background:rgba(255,255,255,0.15);border-radius:20px;overflow:hidden;
    font-family:Arial, sans-serif;font-size:11.5px;font-weight:700;
  }
  .lang-toggle button{
    border:none;background:transparent;color:#fff;padding:6px 12px;cursor:pointer;
  }
  .lang-toggle button.active{background:var(--gold);color:var(--burgundy-dark);}

  .progress-bar{background:#fff;border-bottom:1px solid var(--line);padding:14px 24px;position:sticky;top:0;z-index:10;}
  .progress-track{height:6px;background:var(--gold-light);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--burgundy);width:11%;transition:width .3s ease;}
  .progress-label{font-family:Arial, sans-serif;font-size:11.5px;color:var(--ink-soft);margin-top:6px;display:flex;justify-content:space-between;}

  form{padding:0 24px;}
  .step{display:none;padding-top:26px;}
  .step.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .step-eyebrow{font-family:Arial, sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
  h2{font-size:21px;margin:0 0 6px;color:var(--burgundy);}
  .step-help{font-family:Arial, sans-serif;font-size:13.5px;color:var(--ink-soft);margin-bottom:22px;line-height:1.5;}

  .field{margin-bottom:18px;}
  label{display:block;font-family:Arial, sans-serif;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:5px;}
  label .opt{font-weight:400;color:var(--ink-soft);font-style:italic;}
  input[type=text], input[type=email], input[type=tel], input[type=date], input[type=number], textarea, select{
    width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:7px;
    font-family:Arial, sans-serif;font-size:14.5px;color:var(--ink);background:#fff;
  }
  input:focus, textarea:focus, select:focus{outline:none;border-color:var(--burgundy);box-shadow:0 0 0 3px rgba(139,26,26,0.10);}
  textarea{min-height:80px;resize:vertical;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  @media (max-width:480px){.row2,.row3{grid-template-columns:1fr;}}

  fieldset{border:1px solid var(--line);border-radius:9px;padding:14px 14px 4px;margin-bottom:18px;}
  legend{font-family:Arial, sans-serif;font-size:12.5px;font-weight:700;color:var(--burgundy);padding:0 6px;}
  .radio-row, .check-row{display:flex;gap:18px;flex-wrap:wrap;font-family:Arial, sans-serif;font-size:14px;margin-top:4px;}
  .radio-row label, .check-row label{font-weight:400;display:flex;align-items:center;gap:6px;margin:0;}
  input[type=radio], input[type=checkbox]{width:16px;height:16px;accent-color:var(--burgundy);}

  .person-card{border:1.5px dashed var(--gold);border-radius:10px;padding:16px 14px;margin-bottom:16px;background:#FFFDF7;}
  .person-card h4{margin:0 0 12px;font-family:Arial, sans-serif;font-size:13.5px;color:var(--burgundy);text-transform:uppercase;letter-spacing:1px;}
  .remove-person{font-family:Arial, sans-serif;font-size:11.5px;color:var(--danger);background:none;border:none;cursor:pointer;float:right;text-decoration:underline;padding:0;}
  .add-btn{font-family:Arial, sans-serif;font-size:13px;font-weight:700;color:var(--burgundy);background:#fff;border:1.5px solid var(--burgundy);border-radius:7px;padding:9px 16px;cursor:pointer;margin-bottom:8px;}
  .add-btn:hover{background:var(--burgundy);color:#fff;}

  .officer-row{display:grid;grid-template-columns:1.3fr 1fr auto;gap:8px;margin-bottom:10px;align-items:center;}
  @media (max-width:480px){.officer-row{grid-template-columns:1fr;}}
  .officer-row input, .officer-row select{margin:0;}
  .remove-officer{background:none;border:none;color:var(--danger);font-size:20px;cursor:pointer;padding:0 6px;line-height:1;}

  .checklist-item{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);font-family:Arial, sans-serif;font-size:13.5px;}
  .checklist-item:last-child{border-bottom:none;}
  .checklist-item input{margin-top:3px;}

  .nav-buttons{display:flex;flex-wrap:wrap;justify-content:space-between;gap:10px;margin-top:30px;padding-bottom:10px;}
  .nav-buttons .btn-primary{flex:1 1 100%;order:3;}
  .nav-buttons .btn-secondary{order:1;}
  .nav-buttons .btn-print{order:2;flex:1;}
  @media (min-width:520px){
    .nav-buttons .btn-primary{flex:1;order:2;}
    .nav-buttons .btn-print{order:3;}
  }
  .btn{font-family:Arial, sans-serif;font-size:14.5px;font-weight:700;padding:13px 22px;border-radius:8px;border:none;cursor:pointer;}
  .btn-primary{background:var(--burgundy);color:#fff;flex:1;}
  .btn-primary:hover{background:var(--burgundy-dark);}
  .btn-secondary{background:#fff;color:var(--ink-soft);border:1.5px solid var(--line);}
  .btn-secondary:hover{border-color:var(--ink-soft);}

  .file-number{font-family:Arial, sans-serif;font-size:11px;color:var(--ink-soft);text-align:right;padding:10px 24px 0;}
  .file-number b{color:var(--burgundy);}

  .success-screen{display:none;text-align:center;padding:60px 24px;}
  .success-screen.active{display:block;}
  .success-screen .check{width:64px;height:64px;border-radius:50%;background:var(--burgundy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;}
  .success-screen h2{margin-bottom:10px;}
  .success-screen p{font-family:Arial, sans-serif;color:var(--ink-soft);font-size:14px;line-height:1.6;}

  footer{text-align:center;font-family:Arial, sans-serif;font-size:11px;color:var(--ink-soft);padding:24px;border-top:1px solid var(--line);margin-top:10px;}

  .btn-print{background:#fff;color:var(--burgundy);border:1.5px solid var(--gold);flex:0 0 auto;white-space:nowrap;}
  .btn-print:hover{background:var(--gold-light);}

  #printView{display:none;}
  .print-section{margin-bottom:16px;}
  .print-section h2{font-size:15px;border-bottom:2px solid var(--gold);padding-bottom:4px;margin-bottom:8px;}
  .print-sub{font-family:Arial, sans-serif;font-weight:700;color:var(--burgundy);margin:10px 0 5px;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;}
  .print-row{display:flex;justify-content:space-between;gap:16px;padding:3px 0;border-bottom:1px dotted var(--line);font-family:Arial, sans-serif;font-size:12px;}
  .print-label{font-weight:700;color:var(--ink-soft);flex:0 0 52%;}
  .print-value{flex:1;text-align:right;}
  .print-file{font-family:Arial, sans-serif;font-size:12px;margin:8px 0 18px;color:var(--ink-soft);}

  @media print{
    body > .wrap > *:not(#printView){display:none !important;}
    #printView{display:block !important;padding:6px;}
    #printView header{background:none !important;color:var(--ink) !important;padding:0 0 10px !important;border:none !important;text-align:left !important;display:flex;align-items:center;gap:14px;}
    #printView .logo-img{max-width:130px;padding:0;background:none;margin:0;}
    #printView .doc-title{color:var(--ink) !important;}
    #printView .doc-sub{color:var(--ink-soft) !important;}
  }
</style>

const steps = Array.from(document.querySelectorAll('.step'));

const nextBtn = document.getElementById('nextBtn');

function renderStepLabel(){
  const dict = T[currentLang];
  progressFill.style.width = Math.round(((current+1)/steps.length)*100)+"%";
  stepLabel.textContent = `${dict.stepLabelPrefix} ${current+1} ${dict.stepLabelJoin} ${steps.length}`;
  stepNameEl.textContent = dict.stepNames[current];
}

function render(){
  steps.forEach((s,i)=> s.classList.toggle('active', i===current));
  renderStepLabel();
  prevBtn.style.visibility = current===0 ? 'hidden' : 'visible';
  nextBtn.textContent = current===steps.length-1 ? T[currentLang].btn_submit : T[currentLang].btn_continue;
  window.scrollTo({top:0, behavior:'smooth'});
}

prevBtn.addEventListener('click', ()=>{ if(current>0){current--; render();} });
nextBtn.addEventListener('click', ()=>{
  if(current < steps.length-1){ current++; render(); }
  else { submitForm(); }
});

function collectPersonsSummary(){
  const dict = T[currentLang];

    const get = (suffix)=>{

      if(!el) return '';
      if(el.tagName === 'SELECT') return el.options[el.selectedIndex] ? el.options[el.selectedIndex].textContent.trim() : '';

    };
    const name = get('name');
    if(!name && !get('percent') && !get('phone')) return;
    out += `--- ${dict.p_title} ${idx+1} ---\n`;
    out += `${dict.p_name}: ${name}\n`;

    out += `${dict.p_homeAddress}: ${get('homeAddress')}\n`;

// ---------- Print / Save PDF ----------
function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fieldRow(fieldEl){
  const label = fieldEl.querySelector('label');
  const labelText = label ? label.textContent.trim() : '';
  const radio = fieldEl.querySelector('input[type=radio]');
  if(radio){
    const checked = fieldEl.querySelector('input[type=radio]:checked');
    if(!checked) return '';
    const lbl = checked.closest('label');
    const value = lbl ? lbl.textContent.trim() : checked.value;
    return `<div class="print-row"><span class="print-label">${escapeHtml(labelText)}</span><span class="print-value">${escapeHtml(value)}</span></div>`;
  }
  const input = fieldEl.querySelector('input, select, textarea');
  if(!input) return '';
  let value = '';
  if(input.tagName === 'SELECT'){
    value = input.options[input.selectedIndex] ? input.options[input.selectedIndex].textContent.trim() : '';
  } else {
    value = input.value || '';
  }
  if(!value) return '';
  return `<div class="print-row"><span class="print-label">${escapeHtml(labelText)}</span><span class="print-value">${escapeHtml(value)}</span></div>`;
}

function fieldsetRows(fs){
  const legend = fs.querySelector('legend');
  const legendText = legend ? legend.textContent.trim() : '';
  const hasNestedFields = fs.querySelector('.field');

  // If the fieldset wraps its questions individually in .field divs
  // (e.g. multiple radio groups + a textarea, like the Tied-House section),
  // walk each one instead of collapsing the whole fieldset into one row.
  if(hasNestedFields){
    const inner = walkContainer(fs);
    if(!inner) return '';
    return `<div class="print-sub">${escapeHtml(legendText)}</div>${inner}`;
  }

  const radios = fs.querySelectorAll('input[type=radio]');
  if(radios.length){
    const checked = fs.querySelector('input[type=radio]:checked');
    if(!checked) return '';
    const lbl = checked.closest('label');
    const value = lbl ? lbl.textContent.trim() : checked.value;
    return `<div class="print-row"><span class="print-label">${escapeHtml(legendText)}</span><span class="print-value">${escapeHtml(value)}</span></div>`;
  }

  const checks = fs.querySelectorAll('input[type=checkbox]');
  if(checks.length){
    const values = [];
    checks.forEach(c=>{ if(c.checked){ const lbl=c.closest('label'); values.push(lbl?lbl.textContent.trim():c.value); } });
    if(!values.length) return '';
    return `<div class="print-row"><span class="print-label">${escapeHtml(legendText)}</span><span class="print-value">${escapeHtml(values.join(', '))}</span></div>`;
  }

  return '';
}

function checklistRow(item){
  const cb = item.querySelector('input[type=checkbox]');
  const span = item.querySelector('span');
  if(cb && cb.checked){
    return `<div class="print-row"><span class="print-label">✓</span><span class="print-value">${escapeHtml(span ? span.textContent.trim() : '')}</span></div>`;
  }
  return '';
}

function walkContainer(container){
  let html = '';
  Array.from(container.children).forEach(child=>{
    if(child.id === 'officersContainer'){
      Array.from(child.children).forEach(row=>{
        const nameInput = row.querySelector('input[type=text]');
        const select = row.querySelector('select');
        const name = nameInput ? nameInput.value.trim() : '';
        if(!name) return;
        const cargo = (select && select.selectedIndex >= 0) ? select.options[select.selectedIndex].textContent.trim() : '';
        html += `<div class="print-row"><span class="print-label">${escapeHtml(name)}</span><span class="print-value">${escapeHtml(cargo)}</span></div>`;
      });
    } else if(child.classList && child.classList.contains('person-card')){
      const h4 = child.querySelector('.p-title');
      html += `<div class="print-sub">${escapeHtml(h4 ? h4.textContent.trim() : '')}</div>`;
      html += walkContainer(child);
    } else if(child.classList && child.classList.contains('field')){
      html += fieldRow(child);
    } else if(child.tagName === 'FIELDSET'){
      html += fieldsetRows(child);
    } else if(child.classList && child.classList.contains('checklist-item')){
      html += checklistRow(child);
    } else if(child.children && child.children.length){
      html += walkContainer(child);
    }
  });
  return html;
}

function buildPrintBody(){
  let out = '';
  document.querySelectorAll('.step').forEach(step=>{
    const h2 = step.querySelector('h2');
    const sectionHtml = walkContainer(step);
    if(!sectionHtml) return;
    out += `<div class="print-section"><h2>${escapeHtml(h2 ? h2.textContent.trim() : '')}</h2>${sectionHtml}</div>`;
  });
  return out;
}

function fillPrintView(){
  const dict = T[currentLang];
  const printView = document.getElementById('printView');
  printView.innerHTML = '';

  const headerClone = document.querySelector('header').cloneNode(true);
  const toggle = headerClone.querySelector('.lang-toggle');
  if(toggle) toggle.remove();
  printView.appendChild(headerClone);

  const fileDiv = document.createElement('div');
  fileDiv.className = 'print-file';
  fileDiv.innerHTML = `${escapeHtml(dict.fileNumLabel)} <b>${escapeHtml(fileNum)}</b>`;
  printView.appendChild(fileDiv);

  const body = document.createElement('div');
  body.innerHTML = buildPrintBody();
  printView.appendChild(body);

  return printView;
}

function printQuestionnaire(){
  fillPrintView();
  window.print();
}

document.getElementById('printBtn').addEventListener('click', printQuestionnaire);
document.getElementById('printBtnSuccess').addEventListener('click', printQuestionnaire);

// ---------- Auto-generate PDF + email it (no manual click needed) ----------
async function generatePdfBase64(){
  const printView = fillPrintView();

  // Temporarily show it off-screen so html2canvas can measure/render it
  const prevDisplay = printView.style.display;
  const prevPosition = printView.style.position;
  printView.style.display = 'block';
  printView.style.position = 'fixed';
  printView.style.left = '-9999px';
  printView.style.top = '0';
  printView.style.width = '760px';
  printView.style.background = '#fff';
  printView.style.padding = '24px';

  await new Promise(r => setTimeout(r, 50)); // let layout settle

  const canvas = await html2canvas(printView, { scale: 2, backgroundColor: '#ffffff', useCORS: true });

  printView.style.display = prevDisplay || '';
  printView.style.position = prevPosition || '';
  printView.style.left = '';
  printView.style.width = '';

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'pt', 'a4');
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const imgWidth = pageWidth;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  const imgData = canvas.toDataURL('image/jpeg', 0.92);

  let heightLeft = imgHeight;
  let position = 0;
  pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
  heightLeft -= pageHeight;

  while (heightLeft > 0) {
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }

  // Returns base64 without the "data:application/pdf;base64," prefix
  return pdf.output('datauristring').split(',')[1];
}

async function sendQuestionnaireEmail(){
  try{
    const pdfBase64 = await generatePdfBase64();
    const dba = (document.querySelector('[name="dba"]')||{}).value || '';
    const legalName = (document.querySelector('[name="legalName"]')||{}).value || '';
    const contactEmail = (document.querySelector('[name="contactEmail"]')||{}).value || '';

    await fetch('/api/send-questionnaire-email', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        pdfBase64, fileNum, dba, legalName, contactEmail, lang: currentLang
      })
    });
    // Errores aquí no interrumpen el flujo del usuario — el envío a
    // Netlify Forms ya se hizo y el expediente ya quedó guardado.
  }catch(e){
    console.error('No se pudo enviar el correo con el PDF:', e);
  }
}
